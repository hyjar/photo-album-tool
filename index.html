<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>摄影集排版工具</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
</head>
<body>
  <!-- 顶部工具栏 -->
  <header class="toolbar">
    <div class="toolbar-left">
      <h1 class="app-title">📷 摄影集排版</h1>
      <span id="image-count" class="status-badge"></span>
      <span id="page-count" class="status-badge"></span>
    </div>
    <div class="toolbar-center">
      <button id="btn-undo" class="tool-btn" title="撤销 (Ctrl+Z)" disabled>↩</button>
      <button id="btn-redo" class="tool-btn" title="重做 (Ctrl+Shift+Z)" disabled>↪</button>
      <div class="toolbar-divider"></div>
      <button id="btn-auto-layout" class="tool-btn primary" title="自动排版">排版</button>
      <button id="btn-add-title" class="tool-btn" title="添加标题页">标题页</button>
      <button id="btn-add-chapter" class="tool-btn" title="添加章节页">章节页</button>
      <button id="btn-free-canvas" class="tool-btn" title="添加自由画布页">画布</button>
      <div class="toolbar-divider"></div>
      <button id="btn-text-overlay" class="tool-btn" title="在选中页面添加文字叠加">文字叠加</button>
      <button id="btn-captions" class="tool-btn" title="切换图注显示">图注</button>
      <div class="toolbar-divider"></div>
      <button id="btn-orientation" class="tool-btn" title="切换方向">竖向</button>
      <button id="btn-auto-orient" class="tool-btn" title="竖图竖放、横图横放，文字同步旋转">↕ 自适应</button>
      <div id="canvas-orient-group" class="orient-btns" style="display:none">
        <button id="btn-canvas-orient-on" class="tool-btn small active" title="画布也跟着旋转">画布自适应</button>
        <button id="btn-canvas-orient-off" class="tool-btn small" title="画布方向固定">画布固定</button>
      </div>
    </div>
    <div class="toolbar-right">
      <button id="btn-save" class="tool-btn" title="保存项目 (Ctrl+S)">💾</button>
      <button id="btn-load" class="tool-btn" title="加载项目 (Ctrl+O)">📂</button>
      <button id="btn-export" class="tool-btn primary" title="导出 PDF">📄 导出</button>
      <button id="btn-dark-mode" class="tool-btn" title="暗色模式">🌙</button>
    </div>
  </header>

  <!-- 主体 -->
  <main class="app-body">
    <!-- 左侧边栏 -->
    <aside class="sidebar">
      <!-- 图片导入 -->
      <section class="sidebar-section">
        <div class="section-header">
          <h3>图片素材</h3>
          <button id="select-images-btn" class="small-btn">+ 添加</button>
          <input type="file" id="file-input" multiple accept="image/*" hidden>
        </div>
        <div id="drop-zone" class="drop-zone">
          <div id="import-progress" class="import-progress hidden">
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <span class="progress-text" id="progress-text">处理中 0/0</span>
          </div>
          <div id="thumbnail-list" class="thumbnail-list">
            <div class="empty-hint">拖拽图片或文件夹到此处</div>
          </div>
        </div>
      </section>

      <!-- 智能分类 -->
      <section class="sidebar-section">
        <div class="section-header">
          <h3>智能分类</h3>
          <label class="classify-toggle">
            <input type="checkbox" id="classify-enabled">
            <span>启用</span>
          </label>
        </div>
        <div id="classify-controls" class="theme-controls" style="display:none">
          <label class="control-row">
            <span>分类方式</span>
            <select id="classify-mode">
              <option value="orientation">按方向</option>
              <option value="category">按内容</option>
              <option value="both">方向+内容</option>
            </select>
          </label>
          <div class="classify-actions">
            <button id="btn-classify" class="small-btn">重新分类</button>
            <button id="btn-sort-by-class" class="small-btn accent">按分类排序</button>
          </div>
          <div id="classify-summary" class="classify-summary"></div>
        </div>
      </section>

      <!-- 排版模板 -->
      <section class="sidebar-section">
        <div class="section-header"><h3>排版模板</h3></div>
        <div class="template-grid">
          <button class="template-btn" data-template="grid">
            <span class="template-icon">▦</span><span class="template-label">网格</span>
          </button>
          <button class="template-btn active" data-template="single">
            <span class="template-icon">▣</span><span class="template-label">单页大图</span>
          </button>
          <button class="template-btn" data-template="collage">
            <span class="template-icon">⊞</span><span class="template-label">拼贴</span>
          </button>
          <button class="template-btn" data-template="timeline">
            <span class="template-icon">☷</span><span class="template-label">时间线</span>
          </button>
          <button class="template-btn" data-template="crosspage">
            <span class="template-icon">⬌</span><span class="template-label">跨页大图</span>
          </button>
          <button class="template-btn" data-template="portfolio">
            <span class="template-icon">🖼</span><span class="template-label">作品集</span>
          </button>
        </div>
        <!-- 裁剪模式（仅单页大图模式显示） -->
        <div id="fit-mode-group" class="fit-mode-group">
          <span class="control-label">图片适应</span>
          <div class="fit-btns">
            <button id="fit-cover" class="fit-btn active" title="裁剪填满">裁剪填满</button>
            <button id="fit-contain" class="fit-btn" title="完整显示留白">完整显示</button>
          </div>
        </div>
        <!-- 网格列数（仅网格模式显示） -->
        <div id="grid-columns-group" class="fit-mode-group" style="display:none">
          <span class="control-label">列数</span>
          <div class="fit-btns">
            <button id="grid-cols-2" class="fit-btn active">2列</button>
            <button id="grid-cols-3" class="fit-btn">3列</button>
          </div>
        </div>
      </section>

      <!-- 主题设置 -->
      <section class="sidebar-section">
        <div class="section-header"><h3>主题设置</h3></div>
        <div class="theme-controls">
          <label class="control-row">
            <span>背景色</span>
            <input type="color" id="theme-bg-color" value="#ffffff">
          </label>
          <label class="control-row">
            <span>主题色</span>
            <input type="color" id="theme-accent-color" value="#1a1a2e">
          </label>
          <label class="control-row">
            <span>间距</span>
            <input type="range" id="theme-spacing" min="0" max="20" value="4">
          </label>
          <label class="control-row">
            <span>内边距</span>
            <input type="range" id="theme-padding" min="0" max="30" value="10">
          </label>
          <label class="control-row">
            <span>页面尺寸</span>
            <select id="page-size-select">
              <option value="a4" selected>A4</option>
              <option value="a3">A3</option>
              <option value="letter">Letter</option>
            </select>
          </label>
        </div>
      </section>

      <!-- 页面背景 -->
      <section class="sidebar-section">
        <div class="section-header"><h3>页面背景</h3></div>
        <div class="theme-controls">
          <label class="control-row">
            <span>类型</span>
            <select id="bg-type">
              <option value="none">无</option>
              <option value="solid">纯色</option>
              <option value="gradient">渐变</option>
              <option value="texture">纹理</option>
            </select>
          </label>
          <div id="bg-solid-opts" class="control-row" style="display:none">
            <span>颜色</span>
            <input type="color" id="bg-color" value="#ffffff">
          </div>
          <div id="bg-gradient-opts" style="display:none">
            <label class="control-row"><span>起始色</span><input type="color" id="bg-color" value="#667eea"></label>
            <label class="control-row"><span>结束色</span><input type="color" id="bg-color2" value="#764ba2"></label>
            <label class="control-row"><span>角度</span><input type="number" id="bg-angle" value="135" min="0" max="360" step="15"></label>
          </div>
          <div id="bg-texture-opts" class="control-row" style="display:none">
            <span>图案</span>
            <select id="bg-texture">
              <option value="dots">点阵</option>
              <option value="grid">网格</option>
              <option value="lines">横线</option>
            </select>
          </div>
          <button id="bg-apply" class="small-btn" style="margin-top:6px">应用到当前页</button>
          <button id="bg-apply-all" class="small-btn" style="margin-top:6px">应用到所有页</button>
        </div>
      </section>

      <!-- 水印 -->
      <section class="sidebar-section">
        <div class="section-header">
          <h3>水印</h3>
          <label class="classify-toggle">
            <input type="checkbox" id="wm-enabled">
            <span>启用</span>
          </label>
        </div>
        <div id="wm-controls" class="theme-controls" style="display:none">
          <label class="control-row">
            <span>水印文字</span>
            <input type="text" id="wm-text" value="© 摄影集" class="text-input">
          </label>
          <label class="control-row">
            <span>字号</span>
            <input type="range" id="wm-font-size" min="8" max="72" value="32">
          </label>
          <label class="control-row">
            <span>颜色</span>
            <input type="color" id="wm-color" value="#888888">
          </label>
          <label class="control-row">
            <span>透明度</span>
            <div class="range-row">
              <input type="range" id="wm-opacity" min="5" max="80" value="30">
              <span id="wm-opacity-label">30%</span>
            </div>
          </label>
          <label class="control-row">
            <span>角度</span>
            <div class="range-row">
              <input type="range" id="wm-rotation" min="-90" max="90" value="-30" step="5">
              <span id="wm-rotation-label">-30°</span>
            </div>
          </label>
          <label class="control-row">
            <span>间距</span>
            <input type="range" id="wm-spacing" min="60" max="400" value="150" step="10">
          </label>
          <label class="control-row">
            <span>字体</span>
            <select id="wm-font">
              <option value="system-ui">系统默认</option>
              <option value='"PingFang SC","Microsoft YaHei"'>中文黑体</option>
              <option value='SimSun,"Songti SC"'>中文宋体</option>
              <option value="serif">衬线体</option>
              <option value="sans-serif">无衬线体</option>
            </select>
          </label>
        </div>
      </section>

      <!-- 页码 -->
      <section class="sidebar-section">
        <div class="section-header"><h3>页码与页眉页脚</h3></div>
        <div class="theme-controls">
          <label class="control-row">
            <span>显示页码</span>
            <input type="checkbox" id="pn-enabled">
          </label>
          <label class="control-row">
            <span>位置</span>
            <select id="pn-position">
              <option value="bottom-center">居中</option>
              <option value="bottom-left">左下</option>
              <option value="bottom-right">右下</option>
            </select>
          </label>
          <label class="control-row">
            <span>样式</span>
            <select id="pn-style">
              <option value="number">数字</option>
              <option value="line">带装饰线</option>
            </select>
          </label>
          <label class="control-row">
            <span>页眉</span>
            <input type="text" id="header-text" placeholder="输入页眉文字" class="text-input">
          </label>
          <div class="header-footer-style">
            <select id="header-font-size">
              <option value="8">8px</option>
              <option value="10" selected>10px</option>
              <option value="12">12px</option>
              <option value="14">14px</option>
            </select>
            <input type="color" id="header-color" value="#888888" title="页眉颜色">
          </div>
          <label class="control-row">
            <span>页脚</span>
            <input type="text" id="footer-text" placeholder="输入页脚文字" class="text-input">
          </label>
          <div class="header-footer-style">
            <select id="footer-font-size">
              <option value="8">8px</option>
              <option value="10" selected>10px</option>
              <option value="12">12px</option>
              <option value="14">14px</option>
            </select>
            <input type="color" id="footer-color" value="#888888" title="页脚颜色">
          </div>
        </div>
      </section>

      <!-- 版式预设 -->
      <section class="sidebar-section">
        <div class="section-header"><h3>版式预设</h3></div>
        <div class="preset-row">
          <select id="preset-select" class="preset-select"><option value="">-- 选择预设 --</option></select>
          <button id="btn-save-preset" class="small-btn" title="保存当前页为预设">💾</button>
          <button id="btn-apply-preset" class="small-btn" title="应用预设到当前页">✓</button>
          <button id="btn-delete-preset" class="small-btn" title="删除预设">🗑</button>
        </div>
      </section>
    </aside>

    <!-- 预览区 -->
    <div class="main-content">
      <div id="page-preview" class="page-preview">
        <div class="empty-preview">
          <div class="empty-icon">📷</div>
          <p>导入图片并点击"排版"开始创作</p>
        </div>
      </div>
    </div>

    <!-- 右侧图片控制面板 -->
    <aside id="right-sidebar" class="right-sidebar">
      <div class="section-header">
        <h3>图片控制</h3>
        <button id="close-right-sidebar" class="small-btn">✕</button>
      </div>

      <!-- 图片信息 -->
      <section class="sidebar-section">
        <div class="section-header"><h3>图片信息</h3></div>
        <div class="theme-controls">
          <label class="control-row">
            <span>文件名</span>
            <span id="img-filename" class="status-badge">-</span>
          </label>
          <label class="control-row">
            <span>尺寸</span>
            <span id="img-dimensions" class="status-badge">-</span>
          </label>
        </div>
      </section>

      <!-- 尺寸控制 -->
      <section class="sidebar-section">
        <div class="section-header"><h3>尺寸</h3></div>
        <div class="theme-controls">
          <label class="control-row">
            <span>宽度</span>
            <input type="number" id="img-width" min="10" max="2000" class="text-input">
          </label>
          <label class="control-row">
            <span>高度</span>
            <input type="number" id="img-height" min="10" max="2000" class="text-input">
          </label>
          <label class="control-row">
            <span>锁定比例</span>
            <button id="img-lock-ratio" class="fit-btn active">🔗</button>
          </label>
        </div>
      </section>

      <!-- 变换控制 -->
      <section class="sidebar-section">
        <div class="section-header"><h3>变换</h3></div>
        <div class="theme-controls">
          <label class="control-row">
            <span>旋转</span>
            <input type="range" id="img-rotation" min="0" max="360" value="0">
          </label>
          <label class="control-row">
            <span>角度</span>
            <input type="number" id="img-rotation-input" min="0" max="360" value="0" class="text-input">
          </label>
          <label class="control-row">
            <span>翻转</span>
            <div class="fit-btns">
              <button id="img-flip-h" class="fit-btn">↔</button>
              <button id="img-flip-v" class="fit-btn">↕</button>
            </div>
          </label>
        </div>
      </section>

      <!-- 位置控制 -->
      <section class="sidebar-section">
        <div class="section-header"><h3>位置</h3></div>
        <div class="theme-controls">
          <label class="control-row">
            <span>X</span>
            <input type="number" id="img-x" class="text-input">
          </label>
          <label class="control-row">
            <span>Y</span>
            <input type="number" id="img-y" class="text-input">
          </label>
          <div class="center-btns">
            <button id="btn-center-h" class="small-btn" title="水平居中">↔ 水平</button>
            <button id="btn-center-v" class="small-btn" title="垂直居中">↕ 垂直</button>
          </div>
        </div>
      </section>

      <!-- 边框控制 -->
      <section class="sidebar-section">
        <div class="section-header"><h3>边框</h3></div>
        <div class="theme-controls">
          <label class="control-row">
            <span>宽度</span>
            <input type="number" id="img-border-width" min="0" max="20" value="0" class="text-input">
          </label>
          <label class="control-row">
            <span>颜色</span>
            <input type="color" id="img-border-color" value="#000000">
          </label>
          <label class="control-row">
            <span>圆角</span>
            <input type="number" id="img-border-radius" min="0" max="100" value="0" class="text-input">
          </label>
        </div>
      </section>

      <!-- 滤镜控制 -->
      <section class="sidebar-section">
        <div class="section-header"><h3>滤镜</h3></div>
        <div class="theme-controls">
          <label class="control-row">
            <span>亮度</span>
            <input type="range" id="img-brightness" min="0" max="200" value="100">
          </label>
          <label class="control-row">
            <span>对比度</span>
            <input type="range" id="img-contrast" min="0" max="200" value="100">
          </label>
          <label class="control-row">
            <span>饱和度</span>
            <input type="range" id="img-saturate" min="0" max="200" value="100">
          </label>
          <button id="img-reset-filters" class="small-btn">重置滤镜</button>
        </div>
      </section>
    </aside>
  </main>

  <!-- 导出对话框 -->
  <div id="export-dialog" class="dialog-overlay">
    <div class="dialog">
      <div class="dialog-header">
        <h3>导出 PDF</h3>
        <button id="export-close" class="dialog-close">×</button>
      </div>
      <div class="dialog-body">
        <label class="dialog-field">
          <span>文件名</span>
          <input type="text" id="export-filename" placeholder="摄影集_20260614" class="text-input">
        </label>
        <label class="dialog-field">
          <span>起始页码</span>
          <input type="number" id="export-start" value="1" min="1">
        </label>
        <label class="dialog-field">
          <span>结束页码（留空为全部）</span>
          <input type="number" id="export-end" min="1" placeholder="全部">
        </label>
        <label class="dialog-field">
          <span>输出质量</span>
          <div class="range-row">
            <input type="range" id="export-quality" min="50" max="100" value="92" step="5">
            <span id="export-quality-label">92%</span>
          </div>
        </label>
        <label class="dialog-field">
          <span>渲染精度</span>
          <select id="export-scale">
            <option value="1">标准 (1x)</option>
            <option value="2" selected>高清 (2x)</option>
            <option value="3">超高清 (3x)</option>
          </select>
        </label>
        <div id="export-progress" class="export-progress" style="display:none">
          <div class="progress-bar"><div class="progress-fill" id="export-progress-fill"></div></div>
          <span class="progress-text" id="export-progress-text">导出中...</span>
        </div>
      </div>
      <div class="dialog-footer">
        <button id="export-cancel" class="btn-secondary">取消</button>
        <button id="export-confirm" class="btn-primary">导出</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
